<head>

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registered!'))
            .catch(err => console.error('Service Worker registration failed', err));
        });
      }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000; -webkit-tap-highlight-color: transparent; }
        #map { height: 100vh; width: 100vw; }
        
        /* Loading Overlay */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#555; font-weight:bold;">Loading IIT Madras Map...</p>
    </div>

    <div id="map"></div>
    
    <!-- Offline Indicator -->
    <div id="offline-indicator" style="position: absolute; top: max(75px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); z-index: 1000; background: #E53935; color: white; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(229, 57, 53, 0.4); display: none; transition: opacity 0.3s; white-space: nowrap;">
        ⚠️ Offline Mode Active
    </div>

    <!-- GPS Locating Indicator -->

        <div style="width: 14px; height: 14px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        Locating GPS...
    </div>
    <!-- Search UI -->
    <div id="search-container" style="position: absolute; top: max(15px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px;">

        </div>

    </div>
    
    <!-- GPS Button -->

    <!-- Toast Notification -->

        </div>
        <div style="width:100%; max-width:400px; height:4px; background:rgba(255,255,255,0.15); border-radius:4px; overflow:hidden;">
            <div id="tile-progress-fill" style="height:100%; width:0%; background:linear-gradient(90deg,#007AFF,#4EB8FF); border-radius:4px; transition:width 0.4s ease;"></div>
        </div>
    </div>

    <!-- Bottom Route Card -->
    <div id="route-card" style="position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 1500; border-radius: 24px 24px 0 0; box-shadow: 0 -8px 32px rgba(0,0,0,0.1); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding-bottom: max(24px, env(safe-area-inset-bottom)); display: flex; flex-direction: column;">

        </div>
    </div>

    

    <!-- Turn-by-Turn Navigation Banner -->

        position: absolute;

        left: 50%; transform: translateX(-50%);
        width: calc(90% - 0px); max-width: 400px;
        z-index: 1200;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: white;
        padding: 14px 18px;
        border-radius: 40px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        width: fit-content;
        min-width: 260px;
        padding: 10px 22px;
        display: none;
        align-items: center;
        gap: 14px;
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: opacity 0.3s;
    ">

        </div>
    </div>

        // 3. Offline Pathfinding Engine (Dijkstra)
        
        // Priority Queue for Dijkstra
        class PriorityQueue {
            constructor() { this.elements = []; }
            enqueue(element, priority) {
                this.elements.push({element, priority});
                this.elements.sort((a, b) => a.priority - b.priority);
            }
            dequeue() { return this.elements.shift().element; }
            isEmpty() { return this.elements.length === 0; }
        }

        // Helper: Calculate Haversine distance
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Snap arbitrary coordinate to nearest graph node
        function snapToNearestNode(lat, lon) {
            let nearestId = null;
            let minDistance = Infinity;
            for (const [id, coord] of Object.entries(campusData.graph.nodes)) {
                // graph coords are [lon, lat]
                const dist = getDistance(lat, lon, coord[1], coord[0]);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestId = id;
                }
            }
            return nearestId;
        }

        function dijkstra(startId, endId) {
            const graph = campusData.graph.edges;
            const distances = {};
            const previous = {};
            const pq = new PriorityQueue();

            for (const node in graph) {
                distances[node] = Infinity;
                previous[node] = null;
            }
            
            distances[startId] = 0;
            pq.enqueue(startId, 0);

            while (!pq.isEmpty()) {
                const currentId = pq.dequeue();

                if (currentId === endId) break; // Reached target

                if (graph[currentId]) {
                    for (const neighborId in graph[currentId]) {
                        const weight = graph[currentId][neighborId];
                        const newDist = distances[currentId] + weight;
                        
                        if (newDist < distances[neighborId]) {
                            distances[neighborId] = newDist;
                            previous[neighborId] = currentId;
                            pq.enqueue(neighborId, newDist);
                        }
                    }
                }
            }

            // Reconstruct path
            const path = [];
            let curr = endId;
            while (curr !== null) {
                path.unshift(curr);
                curr = previous[curr];
            }
            
            if (path[0] === startId) return path;
            return null; // No path found
        }

                currentRoutePolyline = L.polyline(latLngs, {
                    color: '#007AFF', // iOS blue
                    weight: 6,
                    opacity: 0.8,
                    dashArray: '10, 10',
                    lineJoin: 'round'
                }).addTo(map);

                // Only fit bounds on first calculation
                if (!isFollowing) {
                    map.fitBounds(currentRoutePolyline.getBounds(), { padding: [50, 50] });
                }
                
                // Calculate rough distance
                let distMeters = 0;
                for(let i=0; i<latLngs.length-1; i++){
                    distMeters += map.distance(latLngs[i], latLngs[i+1]);
                }
                
                // Show Route Card
                document.getElementById('route-dest-name').innerText = destName;
                document.getElementById('route-distance').innerText = 'Distance: ~' + Math.round(distMeters) + ' meters • ' + Math.ceil(distMeters/80) + ' min walk';
                isFollowing = true; // Start following user
                document.getElementById('route-card').style.transform = 'translateY(0)';
                document.getElementById('gps-button').style.bottom = 'calc(max(30px, env(safe-area-inset-bottom)) + 180px)';

            } else {
                showToast("No route found!");
            }
        }


        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.top = 'max(20px, env(safe-area-inset-top))';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.top = '-100px';
            }, 3000);
        }


        // ─── MAP FOLLOW & TURN-BY-TURN NAVIGATION ───────────────────────────

        let currentRoutePath = [];
            currentGraphNodes = []; 
        let currentGraphNodes = []; // Stable graph nodes for logic
        let isFollowing = false;   // Whether map auto-follows user

        // Stop following if user manually pans
        map.on('dragstart', () => { isFollowing = false; });

        function getBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(Δλ) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function getTurnInstruction(angleDiff) {
            // angleDiff: positive = right, negative = left
            if (Math.abs(angleDiff) < 20)  return { icon: '⬆️', text: 'Continue straight' };
            if (angleDiff >= 20 && angleDiff < 50)  return { icon: '↗️', text: 'Bear right' };
            if (angleDiff >= 50 && angleDiff < 130) return { icon: '➡️', text: 'Turn right' };
            if (angleDiff >= 130)                   return { icon: '↩️', text: 'Sharp right' };
            if (angleDiff <= -20 && angleDiff > -50)  return { icon: '↖️', text: 'Bear left' };
            if (angleDiff <= -50 && angleDiff > -130) return { icon: '⬅️', text: 'Turn left' };
            if (angleDiff <= -130)                    return { icon: '↪️', text: 'Sharp left' };
            return { icon: '⬆️', text: 'Continue straight' };
        }

        function formatDistance(meters) {
            if (meters < 50)   return Math.round(meters) + 'm';
            if (meters < 1000) return (Math.round(meters / 10) * 10) + 'm';
            return (meters / 1000).toFixed(1) + 'km';
        }

        
        
        function updateNavBanner(userLat, userLon) {
            if (!currentGraphNodes || currentGraphNodes.length < 2) return;
            const banner = document.getElementById('nav-banner');

            // 1. Find the segment the user is currently on (or approaching)
            // We look for the segment [i, i+1] where the user is closest to the line
            let closestSegmentIdx = 0;
            let minSegmentDist = Infinity;

            for (let i = 0; i < currentGraphNodes.length - 1; i++) {
                const d = getDistanceToSegment(
                    userLat, userLon,
                    currentGraphNodes[i][0], currentGraphNodes[i][1],
                    currentGraphNodes[i+1][0], currentGraphNodes[i+1][1]
                );
                if (d < minSegmentDist) {
                    minSegmentDist = d;
                    closestSegmentIdx = i;
                }
            }

            // Arrival check (use the final destination point)
            const destPt = currentRoutePath[currentRoutePath.length - 1];
            const distToDest = getDistance(userLat, userLon, destPt[0], destPt[1]);
            if (distToDest < 15) {
                document.getElementById('nav-arrow').textContent = '🎯';
                document.getElementById('nav-instruction').textContent = 'You have arrived!';
                document.getElementById('nav-distance').textContent = 'Destination reached';
                return;
            }

            // 2. Calculate stable current bearing from the graph segment
            const currentSegmentBearing = getBearing(
                currentGraphNodes[closestSegmentIdx][0], currentGraphNodes[closestSegmentIdx][1],
                currentGraphNodes[closestSegmentIdx + 1][0], currentGraphNodes[closestSegmentIdx + 1][1]
            );

            // 3. Scan ahead for the next significant turn
            let distToTurn = getDistance(userLat, userLon, currentGraphNodes[closestSegmentIdx+1][0], currentGraphNodes[closestSegmentIdx+1][1]);
            let turnInstr = { icon: '⬆️', text: 'Continue straight' };
            let foundTurn = false;

            for (let i = closestSegmentIdx + 1; i < currentGraphNodes.length - 1; i++) {
                const nextBearing = getBearing(
                    currentGraphNodes[i][0], currentGraphNodes[i][1],
                    currentGraphNodes[i+1][0], currentGraphNodes[i+1][1]
                );

                let diff = nextBearing - currentSegmentBearing;
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;

                // Threshold: 30 degrees for a turn
                if (Math.abs(diff) > 30) {
                    turnInstr = getTurnInstruction(diff);
                    foundTurn = true;
                    break;
                }
                
                distToTurn += getDistance(
                    currentGraphNodes[i][0], currentGraphNodes[i][1],
                    currentGraphNodes[i+1][0], currentGraphNodes[i+1][1]
                );

                if (distToTurn > 200) break; // Don't look too far
            }

            const displayDist = foundTurn ? distToTurn : distToDest;
            const prefix = (foundTurn && displayDist > 20) ? 'In ' : '';
            
            document.getElementById('nav-arrow').textContent = turnInstr.icon;
            document.getElementById('nav-instruction').textContent = turnInstr.text;
            document.getElementById('nav-distance').textContent = prefix + formatDistance(displayDist);
            banner.style.display = 'flex';
        }

        // Helper for more stable snapping
        function getDistanceToSegment(px, py, x1, y1, x2, y2) {
            const l2 = Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2);
            if (l2 === 0) return getDistance(px, py, x1, y1);
            let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
            t = Math.max(0, Math.min(1, t));
            return getDistance(px, py, x1 + t * (x2 - x1), y1 + t * (y2 - y1));
        }

        document.getElementById('cancel-route-btn').addEventListener('click', () => {
            if (currentRoutePolyline) map.removeLayer(currentRoutePolyline);
            if (destinationMarker) map.removeLayer(destinationMarker);
            currentDestination = null;
            document.getElementById('route-card').style.transform = 'translateY(100%)';
            document.getElementById('gps-button').style.bottom = 'max(30px, env(safe-area-inset-bottom))';
            document.getElementById('nav-banner').style.display = 'none';
            currentRoutePath = [];
            currentGraphNodes = [];
            lastRecalcLoc = null;
            isFollowing = false;
            map.setView(userLocation || [12.9914, 80.2337], 17);
        });
</script>

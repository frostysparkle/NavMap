    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registered!'))
            .catch(err => console.error('Service Worker registration failed', err));

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000; -webkit-tap-highlight-color: transparent; }
        #map { height: 100vh; width: 100vw; }
        
        /* Loading Overlay */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    </div>

    <div id="map"></div>

    <!-- Search UI -->

        </div>

        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
    </div>

    <!-- Toast Notification -->
    <div id="toast" style="position: absolute; top: -100px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(30,30,30,0.9); color: white; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.2); white-space: nowrap;">
        Notification
    </div>

    <!-- Map Tile Download Progress -->
    <div id="tile-progress-bar" style="position: fixed; top: auto; bottom: 24px; left: 50%; transform: translateX(-50%); width: auto; min-width: 220px; max-width: 90%; z-index: 3000; display: none; flex-direction: column; align-items: stretch; background: rgba(26,26,46,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 8px 16px; gap: 6px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 16px rgba(0,0,0,0.3);">
        <div style="display:flex; justify-content:space-between; width:100%; align-items: center;">
            <span style="font-size:11px; font-weight:600; color:rgba(255,255,255,0.9); display: flex; align-items: center; gap: 6px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #4EB8FF;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Caching map...
            </span>
            <span id="tile-progress-pct" style="font-size:11px; font-weight:700; color:#4EB8FF; margin-left: 12px;">0%</span>
        </div>
        <div style="width:100%; height:3px; background:rgba(255,255,255,0.15); border-radius:3px; overflow:hidden;">
            <div id="tile-progress-fill" style="height:100%; width:0%; background:linear-gradient(90deg,#007AFF,#4EB8FF); border-radius:3px; transition:width 0.4s ease;"></div>
        </div>
    </div>

    <!-- Bottom Route Card -->
    <div id="route-card" style="position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 1500; border-radius: 24px 24px 0 0; box-shadow: 0 -8px 32px rgba(0,0,0,0.1); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding-bottom: max(24px, env(safe-area-inset-bottom)); display: flex; flex-direction: column;">
        <div style="width: 40px; height: 5px; background: rgba(0,0,0,0.15); border-radius: 3px; margin: 12px auto;"></div>
        <div style="padding: 0 24px;">
            <h2 id="route-dest-name" style="margin: 0 0 8px 0; font-size: 22px; color: #111; font-weight: 700; letter-spacing: -0.5px;">Destination</h2>
            <p id="route-distance" style="margin: 0 0 20px 0; font-size: 15px; color: #666; font-weight: 500;">Calculating...</p>
            <button id="cancel-route-btn" style="width: 100%; padding: 16px; background: #FF3B30; color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(255, 59, 48, 0.25); -webkit-tap-highlight-color: transparent;">End Route</button>
        </div>
    </div>

    <!-- Turn-by-Turn Navigation Banner -->
    <div id="nav-banner" style="
        position: absolute;
        top: max(80px, calc(env(safe-area-inset-top) + 70px));
        left: 50%; transform: translateX(-50%);
        width: fit-content;
        min-width: 260px;
        z-index: 1200;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: white;
        padding: 10px 22px;
        border-radius: 40px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        display: none;
        align-items: center;
        gap: 14px;
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: opacity 0.3s;
    ">
        <div id="nav-arrow" style="font-size: 38px; min-width: 42px; text-align: center; line-height: 1;">⬆️</div>
        <div style="flex: 1; min-width: 0;">
            <div id="nav-distance" style="font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px;">Calculating...</div>
            <div id="nav-instruction" style="font-size: 17px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Getting route...</div>
        </div>
    </div>

    <script>
        let campusData = null;
        let map, userMarker, userLocation, watchId, lastRecalcLoc, currentHeading, currentDestination, currentDestinationName, destinationMarker, currentRoutePolyline, currentRoutePath = [], currentGraphNodes = [], isFollowing = false, toastTimeout, campusBounds, userHeading = null, lastLoc = null;

        // --- PHASE 3 LOGIC (Dijkstra, Distance, etc.) ---
        
        class PriorityQueue {
            constructor() { this.elements = []; }
            enqueue(element, priority) {
                this.elements.push({element, priority});
                this.elements.sort((a, b) => a.priority - b.priority);
            }
            dequeue() { return this.elements.shift().element; }
            isEmpty() { return this.elements.length === 0; }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- DATA FETCHING & CACHING ---
        const DB_NAME = 'IITM_Map_DB';
        const DB_VERSION = 4;
        const STORE_NAME = 'campusData';

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getCachedData() {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get('iitm_data');
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveToCache(data) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put({ data, timestamp: Date.now() }, 'iitm_data');
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function fetchFromOverpass() {
            const query = `[out:json][timeout:900];
area["name"="Indian Institute of Technology - Madras"]->.iitm;
(
  node(area.iitm);
  way(area.iitm);
  relation(area.iitm);
  relation["name"="Indian Institute of Technology - Madras"];
  way["name"="Indian Institute of Technology - Madras"];
);
out geom;`;
            const url = 'https://overpass-api.de/api/interpreter';
            const response = await fetch(url, {
                method: 'POST',
                body: "data=" + encodeURIComponent(query),
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            });
            if (!response.ok) throw new Error('Overpass fetch failed');
            return await response.json();
        }

        function processOSMData(osmData) {
            const data = { buildings: [], graph: { nodes: {}, edges: {} }, boundary: null };
            const allNodes = {};
            osmData.elements.forEach(el => { if (el.type === 'node') allNodes[el.id] = [el.lat, el.lon]; });

            osmData.elements.forEach(el => {
                const tags = el.tags || {};
                
                // Boundary detection
                if (tags.name === 'Indian Institute of Technology - Madras' || tags.name === 'Indian Institute of Technology Madras') {
                    let coords = [];
                    if (el.type === 'way' && el.geometry) {
                        coords = el.geometry.map(p => [p.lon, p.lat]);
                    } else if (el.type === 'relation' && el.members) {
                        el.members.forEach(m => {
                            if (m.role === 'outer' && m.geometry) {
                                coords.push(...m.geometry.map(p => [p.lon, p.lat]));
                            }
                        });
                    }
                    if (coords.length > 0) {
                        console.log("Boundary found for " + tags.name);
                        data.boundary = { type: 'Polygon', coordinates: [coords] };
                    }
                }

                const isPointOfInterest = tags.name && (tags.building || tags.amenity || tags.leisure || tags.shop || tags.tourism);
                
                const getAliases = (t) => {
                    const a = [];
                    if (t.alt_name) a.push(t.alt_name);
                    if (t.short_name) a.push(t.short_name);
                    if (t['name:en']) a.push(t['name:en']);
                    return a;
                };

                if (el.type === 'node' && isPointOfInterest) {
                    data.buildings.push({
                        id: el.id, name: tags.name, lat: el.lat, lon: el.lon,
                        aliases: getAliases(tags),
                        type: tags.building || tags.amenity || tags.leisure || 'POI'
                    });
                } else if (el.type === 'way') {
                    if (tags.highway) {
                        for (let i = 0; i < el.nodes.length; i++) {
                            const nid = el.nodes[i];
                            const coords = el.geometry ? [el.geometry[i].lon, el.geometry[i].lat] : (allNodes[nid] ? [allNodes[nid][1], allNodes[nid][0]] : null);
                            if (!coords) continue;
                            if (!data.graph.nodes[nid]) data.graph.nodes[nid] = coords;
                            if (i > 0) {
                                const prevNid = el.nodes[i - 1];
                                const prevCoords = el.geometry ? [el.geometry[i-1].lon, el.geometry[i-1].lat] : (allNodes[prevNid] ? [allNodes[prevNid][1], allNodes[prevNid][0]] : null);
                                if (prevCoords) {
                                    const dist = getDistance(coords[1], coords[0], prevCoords[1], prevCoords[0]);
                                    if (!data.graph.edges[nid]) data.graph.edges[nid] = {};
                                    if (!data.graph.edges[prevNid]) data.graph.edges[prevNid] = {};
                                    data.graph.edges[nid][prevNid] = dist;
                                    data.graph.edges[prevNid][nid] = dist;
                                }
                            }
                        }
                    }
                    if (isPointOfInterest) {
                        let lat = 0, lon = 0, count = 0;
                        if (el.geometry) el.geometry.forEach(p => { lat += p.lat; lon += p.lon; count++; });
                        if (count > 0) {
                            data.buildings.push({
                                id: el.id, name: tags.name, lat: lat / count, lon: lon / count,
                                aliases: getAliases(tags),
                                type: tags.building || tags.amenity || tags.leisure || 'POI',
                                nodes: el.nodes || []
                            });
                        }
                    }
                } else if (el.type === 'relation') {
                    if (isPointOfInterest) {
                        let lat = 0, lon = 0, count = 0;
                        el.members.forEach(m => { if (m.type === 'way' && m.geometry) { m.geometry.forEach(p => { lat += p.lat; lon += p.lon; count++; }); } });
                        if (count > 0) {
                            data.buildings.push({
                                id: el.id, name: tags.name, lat: lat / count, lon: lon / count,
                                aliases: getAliases(tags),
                                type: tags.building || tags.amenity || tags.leisure || 'POI'
                            });
                        }
                    }
                }
            });

            // Fallback boundary if none found
            if (!data.boundary) {
                console.warn("Explicit boundary not found, calculating fallback bounding box...");
                let minLat = 90, maxLat = -90, minLon = 180, maxLon = -180;
                Object.values(data.graph.nodes).forEach(c => {
                    minLon = Math.min(minLon, c[0]); maxLon = Math.max(maxLon, c[0]);
                    minLat = Math.min(minLat, c[1]); maxLat = Math.max(maxLat, c[1]);
                });
                if (minLat !== 90) {
                    data.boundary = { type: 'Polygon', coordinates: [[[minLon, minLat], [maxLon, minLat], [maxLon, maxLat], [minLon, maxLat], [minLon, minLat]]] };
                }
            }

            // Virtual Building Nodes
            data.buildings.forEach(b => {
                const bNodeId = `b_${b.id}`;
                data.graph.nodes[bNodeId] = [b.lon, b.lat];
                if (!data.graph.edges[bNodeId]) data.graph.edges[bNodeId] = {};
                let connected = false;
                if (b.nodes) {
                    b.nodes.forEach(nid => {
                        if (data.graph.nodes[nid]) {
                            data.graph.edges[bNodeId][nid] = 0;
                            if (!data.graph.edges[nid]) data.graph.edges[nid] = {};
                            data.graph.edges[nid][bNodeId] = 0;
                            connected = true;
                        }
                    });
                }
                if (!connected) {
                    let nearestId = null, minDist = Infinity;
                    for (const [nid, coords] of Object.entries(data.graph.nodes)) {
                        if (nid.startsWith('b_')) continue;
                        const d = getDistance(b.lat, b.lon, coords[1], coords[0]);
                        if (d < minDist) { minDist = d; nearestId = nid; }
                    }
                    if (nearestId) {
                        data.graph.edges[bNodeId][nearestId] = 0;
                        if (!data.graph.edges[nearestId]) data.graph.edges[nearestId] = {};
                        data.graph.edges[nearestId][bNodeId] = 0;
                    }
                }
            });
            return data;
        }

        async function loadApp() {
            try {
                const cached = await getCachedData();
                const threeMonths = 90 * 24 * 60 * 60 * 1000;
                if (cached && (Date.now() - cached.timestamp < threeMonths)) {
                    campusData = cached.data;
                } else if (!navigator.onLine && cached) {
                    campusData = cached.data;
                } else {
                    const osmData = await fetchFromOverpass();
                    campusData = processOSMData(osmData);
                    await saveToCache(campusData);
                    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({ type: 'REFRESH_TILES' });
                    }
                }
                initMap();
            } catch (err) {
                console.error(err);
                const cached = await getCachedData();
                if (cached) { campusData = cached.data; initMap(); }
                else { alert('Failed to load map data. Please check your connection.'); }
            }
        }

        // --- MAP & UI INITIALIZATION ---

        function initMap() {
            map = L.map('map', { zoomControl: false, minZoom: 12, maxZoom: 22 }).setView([12.9914, 80.2337], 17);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxNativeZoom: 19,
                maxZoom: 22
            }).addTo(map);

            map.on('dragstart', () => { isFollowing = false; });

            const worldCoords = [[90, -180], [90, 180], [-90, 180], [-90, -180]];
            let campusBoundaryCoords = [];
            if (campusData.boundary && campusData.boundary.coordinates) {
                const rawCoords = campusData.boundary.type === 'MultiPolygon' ? campusData.boundary.coordinates[0][0] : campusData.boundary.coordinates[0];
                campusBoundaryCoords = rawCoords.map(coord => [coord[1], coord[0]]);
            }
            if (campusBoundaryCoords.length > 0) {
                L.polygon([worldCoords, campusBoundaryCoords], { color: '#2c3e50', fillColor: '#000', fillOpacity: 0.7, weight: 3 }).addTo(map);
                campusBounds = L.latLngBounds(campusBoundaryCoords);
                map.setMaxBounds(campusBounds);
                map.options.maxBoundsViscosity = 1.0;
            }
            
            map.whenReady(() => {
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    if (loading) { loading.style.opacity = '0'; setTimeout(() => loading.remove(), 500); }
                }, 500);
            });

            setupUI();
            setupGeolocation();
        }

        function setupUI() {
            // Offline Detection
            const offlineIndicator = document.getElementById('offline-indicator');
            function updateOnlineStatus() { offlineIndicator.style.display = navigator.onLine ? 'none' : 'block'; }
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();

            // Search
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');
            searchInput.addEventListener('input', (e) => {
                const rawQuery = e.target.value;
                const query = rawQuery.toLowerCase().replace(/[^a-z0-9]/g, '');
                searchResults.innerHTML = '';
                if (query.length < 2) { searchResults.style.display = 'none'; return; }
                const matches = campusData.buildings.filter(b => {
                    const bName = b.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                    const bType = (b.type || '').toLowerCase().replace(/[^a-z0-9]/g, '');
                    const hasAliasMatch = b.aliases && b.aliases.some(a => a.toLowerCase().replace(/[^a-z0-9]/g, '').includes(query));
                    return bName.includes(query) || hasAliasMatch || bType.includes(query);
                }).slice(0, 8);
                if (matches.length > 0) {
                    searchResults.style.display = 'block';
                    matches.forEach(match => {
                        const div = document.createElement('div');
                        div.style.padding = '16px 20px';
                        div.style.borderBottom = '1px solid rgba(0,0,0,0.05)';
                        div.style.cursor = 'pointer';
                        
                        let displayType = match.type || 'Location';
                        if (displayType === 'yes') displayType = 'Building';
                        displayType = displayType.replace(/_/g, ' ');

                        div.innerHTML = `<strong style="color: #111; display: block; font-size: 16px;">${match.name}</strong><small style="color: #666; text-transform: capitalize; font-size: 13px; font-weight: 500;">${displayType}</small>`;
                        div.addEventListener('click', () => {
                            searchInput.value = match.name;
                            searchResults.style.display = 'none';
                            searchInput.blur();
                            setDestination([match.lat, match.lon], match.name);
                        });
                        searchResults.appendChild(div);
                    });
                } else { searchResults.style.display = 'none'; }
            });

            map.on('click', () => { searchResults.style.display = 'none'; searchInput.blur(); });
            
            document.getElementById('cancel-route-btn').addEventListener('click', () => {
                if (currentRoutePolyline) map.removeLayer(currentRoutePolyline);
                if (destinationMarker) map.removeLayer(destinationMarker);
                currentDestination = null;
                document.getElementById('route-card').style.transform = 'translateY(100%)';
                document.getElementById('gps-button').style.bottom = 'max(30px, env(safe-area-inset-bottom))';
                document.getElementById('nav-banner').style.display = 'none';
                currentRoutePath = []; currentGraphNodes = []; lastRecalcLoc = null; isFollowing = false;
                map.setView(userLocation || [12.9914, 80.2337], 17);
            });
        }

        const blueDotIcon = L.divIcon({
            className: 'user-location-icon',
            html: `
                <div id="user-dot-root" style="position:relative; width:40px; height:40px; display:flex; align-items:center; justify-content:center;">
                    <div id="user-arrow" style="position:absolute; top:0; left:50%; transform:translateX(-50%) rotate(0deg); transform-origin: center bottom; width:0; height:0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 22px solid rgba(66,133,244,0.55); transition: transform 0.3s ease; display:none;"></div>
                    <div style="width:18px; height:18px; background:#4285F4; border-radius:50%; border:3px solid white; box-shadow:0 0 0 4px rgba(66,133,244,0.25), 0 2px 6px rgba(0,0,0,0.3); z-index:1; flex-shrink:0;"></div>
                </div>`,
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        function setupGeolocation() {
            const gpsLocating = document.getElementById('gps-locating');
            const gpsBtn = document.getElementById('gps-button');
            
            const handlePosition = (position, isInitial = false) => {
                const lat = position.coords.latitude, lon = position.coords.longitude;
                
                // Track user heading based on GPS movement
                if (lastLoc) {
                    const movedDist = getDistance(lastLoc[0], lastLoc[1], lat, lon);
                    if (movedDist > 2) {
                        userHeading = getBearing(lastLoc[0], lastLoc[1], lat, lon);
                    }
                }
                lastLoc = [lat, lon];

                // Geofencing check
                if (campusBounds && !campusBounds.contains([lat, lon])) {
                    if (!isInitial) {
                        gpsLocating.style.display = 'none';
                        showToast("Invalid Location: You are outside the campus.");
                    }
                    return;
                }

                gpsLocating.style.display = 'none';
                userLocation = [lat, lon];
                if (!userMarker) {
                    userMarker = L.marker(userLocation, { icon: blueDotIcon }).addTo(map);
                    map.setView(userLocation, 18);
                    if (!isInitial) isFollowing = true;
                } else {
                    userMarker.setLatLng(userLocation);
                    if (isFollowing || isInitial) map.setView(userLocation, 18);
                }
                
                if (currentDestination) {
                    if (currentRoutePath.length === 0) {
                        calculateAndDrawRoute(userLocation, currentDestination, currentDestinationName || "Destination");
                    } else {
                        let minDistToRoute = Infinity;
                        for (let i = 0; i < currentRoutePath.length - 1; i++) {
                            const d = getDistanceToSegment(lat, lon, currentRoutePath[i][0], currentRoutePath[i][1], currentRoutePath[i+1][0], currentRoutePath[i+1][1]);
                            if (d < minDistToRoute) minDistToRoute = d;
                        }
                        // Recalculate if off-route by > 12 meters (more aggressive for missed turns)
                        if (minDistToRoute > 12) {
                            calculateAndDrawRoute(userLocation, currentDestination, currentDestinationName || "Destination");
                        } else {
                            updateNavBanner(lat, lon);
                        }
                    }
                }
            };

            const startGps = (isInitial = false) => {
                if (navigator.geolocation) {
                    if (!isInitial) gpsLocating.style.display = 'flex';
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    
                    watchId = navigator.geolocation.watchPosition(
                        pos => handlePosition(pos, isInitial),
                        err => {
                            if (!isInitial) {
                                gpsLocating.style.display = 'none';
                                if (err.code !== 3) showToast("Unable to access GPS location.");
                            }
                        },
                        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                    );
                } else if (!isInitial) {
                    showToast("Geolocation is not supported.");
                }
            };

            gpsBtn.addEventListener('click', () => {
                startCompass(); // Attempt orientation (gesture-triggered)
                gpsBtn.style.transform = 'scale(0.9)';
                setTimeout(() => gpsBtn.style.transform = 'scale(1)', 200);
                isFollowing = true; // Focus on user when button is tapped
                startGps(false);
            });

            // Automatically request location on load
            startGps(true);
        }

        // Compass / Orientation Logic
        function applyHeading(degrees) {
            const arrowEl = document.getElementById('user-arrow');
            if (arrowEl) { arrowEl.style.transform = `translateX(-50%) rotate(${degrees}deg)`; arrowEl.style.display = 'block'; }
        }
        function startCompass() {
            if (typeof DeviceOrientationEvent !== 'undefined') {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(state => { if (state === 'granted') listenOrientation(); }).catch(console.warn);
                } else { listenOrientation(); }
            }
        }
        function listenOrientation() {
            window.addEventListener('deviceorientationabsolute', onOrient, true);
            window.addEventListener('deviceorientation', onOrient, true);
        }
        function onOrient(e) {
            let heading = null;
            if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
            else if (e.absolute && e.alpha !== null) heading = (360 - e.alpha) % 360;
            if (heading !== null) applyHeading(Math.round(heading));
        }

        // Navigation Logic
        function snapToNearestNode(lat, lon) {
            let nearestId = null, minDistance = Infinity;
            for (const [id, coord] of Object.entries(campusData.graph.nodes)) {
                const dist = getDistance(lat, lon, coord[1], coord[0]);
                if (dist < minDistance) { minDistance = dist; nearestId = id; }
            }
            return nearestId;
        }

        function dijkstra(startId, endId) {
            const graph = campusData.graph.edges;
            const distances = {}, previous = {}, pq = new PriorityQueue();
            for (const node in campusData.graph.nodes) { distances[node] = Infinity; previous[node] = null; }
            if (!distances.hasOwnProperty(startId)) return null;
            distances[startId] = 0; pq.enqueue(startId, 0);
            while (!pq.isEmpty()) {
                const curr = pq.dequeue();
                if (curr === endId) break;
                if (graph[curr]) {
                    for (const neighbor in graph[curr]) {
                        const newDist = distances[curr] + graph[curr][neighbor];
                        if (newDist < distances[neighbor]) {
                            distances[neighbor] = newDist; previous[neighbor] = curr; pq.enqueue(neighbor, newDist);
                        }
                    }
                }
            }
            const path = []; let c = endId;
            while (c !== null) { path.unshift(c); c = previous[c]; }
            return path[0] === startId ? path : null;
        }

        function setDestination(latLng, name) {
            currentDestination = latLng; currentDestinationName = name;
            if (destinationMarker) map.removeLayer(destinationMarker);
            destinationMarker = L.marker(latLng, { icon: L.divIcon({ className: 'dest-marker', html: '<div style="font-size:32px; margin-top:-32px; margin-left:-16px;">🎯</div>', iconSize: [32, 32] }) }).addTo(map);
            map.setView(latLng, 16);
            if (userLocation) calculateAndDrawRoute(userLocation, latLng, name);
            else showToast("Enable GPS to get directions.");
        }

        function calculateAndDrawRoute(start, end, name) {
            if (currentRoutePolyline) map.removeLayer(currentRoutePolyline);
            const sId = snapToNearestNode(start[0], start[1]), eId = snapToNearestNode(end[0], end[1]);
            const pathIds = dijkstra(sId, eId);
            if (pathIds) {
                const latLngs = pathIds.map(id => [campusData.graph.nodes[id][1], campusData.graph.nodes[id][0]]);
                latLngs.unshift(start); latLngs.push(end);
                currentRoutePath = latLngs;
                currentGraphNodes = pathIds.map(id => [campusData.graph.nodes[id][1], campusData.graph.nodes[id][0]]);
                currentRoutePolyline = L.polyline(latLngs, { color: '#007AFF', weight: 6, opacity: 0.8, dashArray: '10, 10' }).addTo(map);
                if (!isFollowing) map.fitBounds(currentRoutePolyline.getBounds(), { padding: [50, 50] });
                let dist = 0; for(let i=0; i<latLngs.length-1; i++) dist += getDistance(latLngs[i][0], latLngs[i][1], latLngs[i+1][0], latLngs[i+1][1]);
                document.getElementById('route-dest-name').innerText = name;
                document.getElementById('route-distance').innerText = `Distance: ~${Math.round(dist)}m • ${Math.ceil(dist/80)} min walk`;
                isFollowing = true;
                document.getElementById('route-card').style.transform = 'translateY(0)';
                document.getElementById('gps-button').style.bottom = 'calc(max(30px, env(safe-area-inset-bottom)) + 180px)';
            } else { showToast("No route found!"); }
        }

        function updateNavBanner(lat, lon) {
            if (currentGraphNodes.length < 2) return;
            let closestIdx = 0, minDist = Infinity;
            for (let i = 0; i < currentGraphNodes.length - 1; i++) {
                const d = getDistanceToSegment(lat, lon, currentGraphNodes[i][0], currentGraphNodes[i][1], currentGraphNodes[i+1][0], currentGraphNodes[i+1][1]);
                if (d < minDist) { minDist = d; closestIdx = i; }
            }
            const dest = currentRoutePath[currentRoutePath.length - 1];
            const distToDest = getDistance(lat, lon, dest[0], dest[1]);
            if (distToDest < 12) {
                document.getElementById('nav-arrow').textContent = '🎯';
                document.getElementById('nav-instruction').textContent = 'You have arrived!';
                document.getElementById('nav-distance').textContent = 'Destination reached';
                return;
            }
            
            let currentBearing = getBearing(currentGraphNodes[closestIdx][0], currentGraphNodes[closestIdx][1], currentGraphNodes[closestIdx+1][0], currentGraphNodes[closestIdx+1][1]);
            
            // Check if user is walking wrong way
            if (userHeading !== null) {
                let diff = currentBearing - userHeading;
                if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
                if (Math.abs(diff) > 135) {
                    document.getElementById('nav-arrow').textContent = '↩️';
                    document.getElementById('nav-instruction').textContent = 'Turn around';
                    document.getElementById('nav-distance').textContent = 'Walking wrong way';
                    document.getElementById('nav-banner').style.display = 'flex';
                    return;
                }
            }

            let turnInstr = { icon: '⬆️', text: 'Continue straight' }, found = false;
            let distToTurn = getDistance(lat, lon, currentGraphNodes[closestIdx+1][0], currentGraphNodes[closestIdx+1][1]);
            
            for (let i = closestIdx + 1; i < currentGraphNodes.length - 1; i++) {
                const nextB = getBearing(currentGraphNodes[i][0], currentGraphNodes[i][1], currentGraphNodes[i+1][0], currentGraphNodes[i+1][1]);
                let diff = nextB - currentBearing;
                if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
                
                // Ignore micro-curves, only announce real turns > 25 degrees
                if (Math.abs(diff) > 25) { 
                    turnInstr = getTurnInstruction(diff); 
                    found = true; 
                    break; 
                }
                // Update bearing for sequential segment checks
                currentBearing = nextB;
                distToTurn += getDistance(currentGraphNodes[i][0], currentGraphNodes[i][1], currentGraphNodes[i+1][0], currentGraphNodes[i+1][1]);
                if (distToTurn > 200) break;
            }
            
            const d = found ? distToTurn : distToDest;
            document.getElementById('nav-arrow').textContent = turnInstr.icon;
            document.getElementById('nav-instruction').textContent = turnInstr.text;
            document.getElementById('nav-distance').textContent = (found && d > 10 ? 'In ' : '') + formatDistance(d);
            document.getElementById('nav-banner').style.display = 'flex';
        }

        // Helpers for Navigation
        function getBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180, Δλ = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(Δλ) * Math.cos(φ2), x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
        function getTurnInstruction(diff) {
            if (Math.abs(diff) < 25) return { icon: '⬆️', text: 'Continue straight' };
            if (diff >= 25 && diff < 60) return { icon: '↗️', text: 'Slight right' };
            if (diff >= 60 && diff < 120) return { icon: '➡️', text: 'Turn right' };
            if (diff >= 120) return { icon: '↩️', text: 'Make a U-turn' };
            if (diff <= -25 && diff > -60) return { icon: '↖️', text: 'Slight left' };
            if (diff <= -60 && diff > -120) return { icon: '⬅️', text: 'Turn left' };
            return { icon: '↪️', text: 'Make a U-turn' };
        }
        function formatDistance(m) { return m < 50 ? Math.round(m) + 'm' : (m < 1000 ? (Math.round(m/10)*10) + 'm' : (m/1000).toFixed(1) + 'km'); }
        function getDistanceToSegment(px, py, x1, y1, x2, y2) {
            const l2 = Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2);
            if (l2 === 0) return getDistance(px, py, x1, y1);
            let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
            t = Math.max(0, Math.min(1, t));
            return getDistance(px, py, x1 + t * (x2 - x1), y1 + t * (y2 - y1));
        }
        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.top = 'max(20px, env(safe-area-inset-top))';
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { t.style.top = '-100px'; }, 3000);
        }

        // SW Progress
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', e => {
                if (e.data && e.data.type === 'TILE_CACHE_PROGRESS') {
                    const bar = document.getElementById('tile-progress-bar'), fill = document.getElementById('tile-progress-fill'), pct = document.getElementById('tile-progress-pct');
                    if (bar) { bar.style.display = 'flex'; fill.style.width = e.data.progress + '%'; pct.textContent = e.data.progress + '%'; if (e.data.progress >= 100) setTimeout(() => bar.style.display = 'none', 2000); }
                }
            });
        }

        loadApp();
    </script>
</body>
</html>
